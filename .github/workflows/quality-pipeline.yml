name: Odin4 Quality Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: \( {{ github.workflow }}- \){{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.compiler }} - ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [clang-18, gcc-14]
        build_type: [Debug, Release]
      fail-fast: false

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ninja-build \
            clang-18 clang-tidy-18 lld-18 \
            gcc-14 g++-14 \
            cmake \
            ccache \
            pkg-config \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            qt6-base-dev \
            qt6-tools-dev \
            iwyu

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@13c5b28e4a76834446e40f66722377da0514d5a0 # v1.2
        with:
          key: \( {{ matrix.compiler }}- \){{ matrix.build_type }}

      - name: Configure CMake
        run: |
          CC=${{ matrix.compiler == 'clang-18' && 'clang-18' || 'gcc-14' }}
          CXX=${{ matrix.compiler == 'clang-18' && 'clang++-18' || 'g++-14' }}
          
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DODIN4_BUILD_GUI=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload artifact (Release Clang)
        if: matrix.build_type == 'Release' && matrix.compiler == 'clang-18'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: odin4-linux-release
          path: build/odin4
          retention-days: 14

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang-18 clang-tidy-18 clang-format-18 \
            cppcheck \
            cmake ninja-build \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            qt6-base-dev

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DODIN4_BUILD_GUI=ON

      - name: clang-format check
        run: |
          find src include src/gui -name '*.cpp' -o -name '*.h' | \
          xargs clang-format-18 --dry-run --Werror -style=file

      - name: clang-tidy
        run: |
          run-clang-tidy-18 -p build -quiet -header-filter="^(src|include)/" || true

      - name: cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c++23 \
            --suppress=missingIncludeSystem \
            --project=build/compile_commands.json \
            --error-exitcode=1 \
            src/ include/ src/gui/

  tests:
    name: Tests + Sanitizers
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build clang-18 cmake libusb-1.0-0-dev libcrypto++-dev qt6-base-dev

      - name: Configure with Sanitizers
        run: |
          cmake -S . -B build-test \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined,leak -fno-omit-frame-pointer" \
            -DODIN4_BUILD_TESTS=ON \
            -DODIN4_BUILD_GUI=OFF

      - name: Build & Run Tests
        run: |
          cmake --build build-test --parallel
          cd build-test
          ctest --output-on-failure -j$(nproc)