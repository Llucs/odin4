name: Odin4 Protocol Intelligence

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  protocol-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Odin4
        uses: actions/checkout@v4

      - name: Clone Heimdall, Brokkr, and Thor
        run: |
          git clone --depth 1 https://github.com/Benjamin-Dobell/Heimdall.git refs/Heimdall
          git clone --depth 1 https://github.com/Gabriel2392/brokkr-flash.git refs/Brokkr
          git clone --depth 1 https://github.com/Samsung-Loki/Thor.git refs/Thor

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Generate protocol prompt
        run: |
          cat > protocol_prompt.md << 'EOF'
          You are working on Odin4. Analyze the flash protocol implementation.

          Rules:
          - Never invent protocol behavior.
          - Never invent packet formats.
          - Never invent Odin protocol logic.
          - Never create placeholder code.
          - Never create examples.
          - Never create TODOs.
          - Never generate mock implementations.
          - Never generate speculative protocol features.
          - Only implement behavior verified from the reference files provided.
          - Treat reference implementations as protocol ground truth.
          - Preserve compatibility and reliability.
          - Use English only.
          - Credits must remain exclusively attributed to Llucs.
          - Do not mention AI or add assistant credits.

          Tasks:
          1. Compare Odin4 against Heimdall, Brokkr, and Thor.
          2. Identify bugs, protocol inconsistencies, and missing functionality.
          3. Identify unsafe behavior, performance bottlenecks, and memory inefficiencies.

          Generate analysis-report.md containing:
          - Problem
          - Evidence
          - Reference repository & file
          - Proposed fix

          Do not modify code yet.
          EOF

      - name: Analysis pass
        env:
          OPENAI_API_KEY: public
          OPENAI_API_BASE: https://opencode.ai/zen/v1
        run: |
          # Passando explicitamente os diretórios de referência como leitura
          aider \
            --yes \
            --model openai/deepseek-v4-flash-free \
            --message-file protocol_prompt.md \
            --read refs/Heimdall/heimdall/source \
            --read refs/Thor/src \
            --read refs/Brokkr/src

      - name: Create implementation prompt
        run: |
          cat > implementation_prompt.md << 'EOF'
          Read analysis-report.md.

          Implement only findings supported by evidence. Fix confirmed bugs, improve protocol correctness, reliability, maintainability, memory usage, and transfer efficiency.

          Requirements:
          - No placeholders, mock code, or examples.
          - No speculative protocol behavior.
          - No protocol changes without evidence.
          - Keep credits exclusively attributed to Llucs.
          - Do not mention AI.
          EOF

      - name: Implementation pass
        env:
          OPENAI_API_KEY: public
          OPENAI_API_BASE: https://opencode.ai/zen/v1
        run: |
          aider \
            --yes \
            --model openai/deepseek-v4-flash-free \
            --message-file implementation_prompt.md

      - name: Build project (Validation)
        run: |
          # Substitua pelos comandos reais de build em C/C++ do odin4
          # Exemplo genérico com Make:
          make clean && make || true 

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ai-protocol-improvements
          title: "Protocol Improvements and Reliability Fixes"
          commit-message: "Refactor: Protocol improvements and reliability fixes"
          body: |
            Automated protocol improvements based on Heimdall, Brokkr, and Thor references.

            - Reliability fixes
            - Performance improvements
            - Code quality adjustments
