name: Odin4 Protocol Intelligence

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  protocol-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Odin4
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Heimdall
        run: |
          git clone --depth 1 https://github.com/Benjamin-Dobell/Heimdall.git refs/Heimdall

      - name: Clone Brokkr
        run: |
          git clone --depth 1 https://github.com/Gabriel2392/brokkr-flash.git refs/Brokkr

      - name: Clone Thor
        run: |
          git clone --depth 1 https://github.com/Samsung-Loki/Thor.git refs/Thor

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Create branch
        run: |
          git checkout -b ai-protocol-improvements

      - name: Generate repository inventory
        run: |
          find . -type f > repository-files.txt

      - name: Generate protocol prompt
        run: |
          cat > protocol_prompt.md << 'EOF'
          You are working on Odin4.

          Repository:
          https://github.com/Llucs/odin4

          Reference repositories:

          https://github.com/Benjamin-Dobell/Heimdall
          https://github.com/Gabriel2392/brokkr-flash
          https://github.com/Samsung-Loki/Thor

          Analyze:

          - Flash protocol implementation
          - USB communication
          - Packet handling
          - Session management
          - PIT handling
          - Threading
          - Transfer pipeline
          - Error handling
          - Reliability
          - Performance
          - Memory management

          Rules:

          - Never invent protocol behavior.
          - Never invent packet formats.
          - Never invent Odin protocol logic.
          - Never create placeholder code.
          - Never create examples.
          - Never create TODOs.
          - Never generate mock implementations.
          - Never generate speculative protocol features.
          - Only implement behavior verified from Heimdall, Brokkr or Thor.
          - Treat reference implementations as protocol ground truth.
          - Preserve compatibility.
          - Preserve reliability.
          - Use English only.
          - Credits must remain exclusively attributed to Llucs.
          - Do not mention AI.
          - Do not add assistant credits.

          Tasks:

          1. Compare Odin4 against Heimdall.
          2. Compare Odin4 against Brokkr.
          3. Compare Odin4 against Thor.
          4. Identify bugs.
          5. Identify protocol inconsistencies.
          6. Identify missing functionality.
          7. Identify unsafe behavior.
          8. Identify performance bottlenecks.
          9. Identify memory inefficiencies.
          10. Identify cleaner implementations.

          Generate:

          analysis-report.md

          The report must include:

          - Problem
          - Evidence
          - Reference repository
          - Reference file
          - Proposed fix

          Do not modify code yet.
          EOF

      - name: Analysis pass
        env:
          OPENAI_API_KEY: public
          OPENAI_API_BASE: https://opencode.ai/zen/v1
        run: |
          aider \
            --yes \
            --model openai/deepseek-v4-flash-free \
            --message-file protocol_prompt.md

      - name: Create implementation prompt
        run: |
          cat > implementation_prompt.md << 'EOF'
          Read analysis-report.md.

          Implement only findings supported by evidence.

          Requirements:

          - No placeholders
          - No examples
          - No mock code
          - No speculative protocol behavior
          - No undocumented Odin logic
          - No protocol changes without evidence

          Goals:

          - Fix confirmed bugs
          - Improve protocol correctness
          - Improve reliability
          - Improve maintainability
          - Improve memory usage
          - Improve transfer efficiency
          - Reduce duplicated code

          Rebuild after modifications.

          Fix build failures if introduced.

          Verify consistency across modified files.

          Do not mention AI.

          Keep credits exclusively attributed to Llucs.
          EOF

      - name: Implementation pass
        env:
          OPENAI_API_KEY: public
          OPENAI_API_BASE: https://opencode.ai/zen/v1
        run: |
          aider \
            --yes \
            --model openai/deepseek-v4-flash-free \
            --message-file implementation_prompt.md

      - name: Build project
        run: |
          chmod +x gradlew || true
          ./gradlew build || true

      - name: Show changes
        run: |
          git status
          git diff --stat

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Protocol improvements and reliability fixes"
          fi

      - name: Push changes
        run: |
          git push origin ai-protocol-improvements --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ai-protocol-improvements
          title: Protocol Improvements and Reliability Fixes
          body: |
            Protocol improvements.

            Reliability fixes.

            Performance improvements.

            Code quality improvements.