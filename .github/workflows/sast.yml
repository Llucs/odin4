name: SAST (CodeQL)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis (C/C++)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ "cpp" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6

      - name: Add GCC 16 PPA
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get install -y \
            gcc-16 g++-16 \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            qt6-base-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@eda5730a8bfb740e03a28087a958444c646e5842 # v4
        with:
          languages: ${{ matrix.language }}

      - name: Configure CMake (GCC 16)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc-16 \
            -DCMAKE_CXX_COMPILER=g++-16 \
            -DCMAKE_CXX_STANDARD=23

      - name: Build project
        run: |
          cmake --build build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@eda5730a8bfb740e03a28087a958444c646e5842 # v4