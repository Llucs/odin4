name: SAST (CodeQL)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis (C/C++)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ "cpp" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Add GCC 16 PPA
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get install -y \
            gcc-16 g++-16 \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            qt6-base-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f133996fb588ff4e83f1e1d4911404720ac9cb17 # v4
        with:
          languages: ${{ matrix.language }}

      - name: Configure CMake (GCC 16)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc-16 \
            -DCMAKE_CXX_COMPILER=g++-16 \
            -DCMAKE_CXX_STANDARD=23

      - name: Build project
        run: |
          cmake --build build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@bfb6be4b5ecd3650f02f530571453e8c64ef0778 # v4