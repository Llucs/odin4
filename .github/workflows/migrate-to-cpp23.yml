name: C++23 Migration Odin4

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: odin4-cpp23-migration
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            git \
            clang \
            clang-tidy \
            clang-tools \
            pkg-config \
            libusb-1.0-0-dev \
            libcrypto++-dev

      - name: Configure CMake
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build project
        run: |
          set -euo pipefail
          cmake --build build --parallel "$(nproc)"

      - name: Run clang-tidy migration
        run: |
          set -euo pipefail
          run-clang-tidy -p build \
            -header-filter='src/|include/' \
            -checks='modernize-*,performance-*,readability-*' \
            -fix

      - name: Switch to C++23
        run: |
          set -euo pipefail
          sed -i 's/CMAKE_CXX_STANDARD 17/CMAKE_CXX_STANDARD 23/g' CMakeLists.txt

      - name: Rebuild after migration
        run: |
          set -euo pipefail
          rm -rf build
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build --parallel "$(nproc)"

      - name: Create migration branch
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b cpp23-migration

      - name: Commit changes
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Migrate to C++23"

      - name: Push branch
        run: |
          set -euo pipefail
          git push origin cpp23-migration --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: cpp23-migration
          base: main
          title: Migrate Odin4 to C++23
          body: Automatic migration to C++23 using clang-tidy modernize checks
          commit-message: Migrate to C++23
          delete-branch: true