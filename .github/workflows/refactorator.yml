name: Odin4 Refactor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

concurrency:
  group: odin4-refactor
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  ultra-refactor:
    name: Refactor + Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate branch name
        shell: bash
        run: |
          set -euo pipefail

          echo "BRANCH=auto/refactor-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            clang \
            clang-format \
            clang-tidy \
            clang-tools \
            cppcheck \
            gcc \
            g++ \
            cmake \
            ninja-build \
            git \
            curl \
            wget \
            zip \
            unzip \
            pkg-config \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            python3 \
            python3-pip

      - name: Ensure Crypto++ exists
        shell: bash
        run: |
          set -euo pipefail

          if ! ldconfig -p | grep -qi cryptopp; then
            rm -rf /tmp/cryptopp

            git clone --depth 1 \
              --branch CRYPTOPP_8_9_0 \
              https://github.com/weidai11/cryptopp.git \
              /tmp/cryptopp

            cd /tmp/cryptopp

            make -j"$(nproc)"

            sudo make install PREFIX=/usr/local

            sudo ldconfig || true
          fi

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.cache
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_EXTENSIONS=OFF

      - name: Run clang-format
        shell: bash
        run: |
          set -euo pipefail

          find . \
            \( \
              -name '*.cpp' -o \
              -name '*.cc' -o \
              -name '*.cxx' -o \
              -name '*.hpp' -o \
              -name '*.h' \
            \) \
            -not -path './build/*' \
            -print0 | while IFS= read -r -d '' file; do
              clang-format -i "$file"
            done

      - name: Run clang-tidy
        shell: bash
        run: |
          set -euo pipefail

          find src include \
            \( -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) \
            -print0 | while IFS= read -r -d '' file; do

              clang-tidy "$file" \
                -p build \
                --fix \
                --fix-errors \
                -checks='
                  modernize-*,
                  performance-*,
                  readability-*,
                  bugprone-*,
                  portability-*,
                  clang-analyzer-*,
                  -readability-identifier-length
                ' || true

            done

      - name: Run cppcheck
        shell: bash
        run: |
          set -euo pipefail

          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c++23 \
            --force \
            --quiet \
            src include || true

      - name: Cleanup formatting
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \
            \( \
              -name '*.cpp' -o \
              -name '*.hpp' -o \
              -name '*.h' -o \
              -name '*.md' -o \
              -name '*.yml' \
            \) \
            -exec sed -i 's/[[:space:]]*$//' {} +

          find . -type f \
            \( \
              -name '*.cpp' -o \
              -name '*.hpp' -o \
              -name '*.h' -o \
              -name '*.md' -o \
              -name '*.yml' \
            \) \
            -exec sed -i 's/\r$//' {} +

      - name: Build project
        shell: bash
        run: |
          set -euo pipefail

          cmake --build build --parallel "$(nproc)"

      - name: Verify binary exists
        shell: bash
        run: |
          set -euo pipefail

          test -f build/odin4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp

      - name: Autobuild CodeQL
        uses: github/codeql-action/autobuild@v4

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v4

      - name: Check for changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
          else
            echo "NO_CHANGES=false" >> "$GITHUB_ENV"
          fi

      - name: Create Pull Request
        if: env.NO_CHANGES == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}
          base: main
          commit-message: "refactor: automatic modernization"
          title: "refactor: automatic modernization"
          body: |
            ## Automatic Refactor

            This PR was automatically generated.

            ### Improvements
            - clang-format
            - clang-tidy modernization
            - performance optimizations
            - readability cleanup
            - bug-prone fixes
            - static analysis
            - CodeQL security scan
            - rebuild validation

            ### Validation
            - Build succeeded
            - Static analysis completed
            - Security analysis completed