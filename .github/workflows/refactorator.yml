name: Odin4 Ultra Refactor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

concurrency:
  group: odin4-ultra-refactor
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  ultra-refactor:
    name: Ultra Refactor + Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            clang \
            clang-format \
            clang-tidy \
            clang-tools \
            cppcheck \
            gcc \
            g++ \
            cmake \
            ninja-build \
            git \
            curl \
            wget \
            zip \
            unzip \
            pkg-config \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            python3 \
            python3-pip

      - name: Ensure Crypto++ exists
        shell: bash
        run: |
          set -euo pipefail

          if ! ldconfig -p | grep -qi cryptopp; then
            rm -rf /tmp/cryptopp

            git clone --depth 1 \
              --branch CRYPTOPP_8_9_0 \
              https://github.com/weidai11/cryptopp.git \
              /tmp/cryptopp

            cd /tmp/cryptopp

            make -j"$(nproc)"

            sudo make install PREFIX=/usr/local

            sudo ldconfig || true
          fi

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.cache
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Create branch
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="auto/ultra-refactor-$(date +%Y%m%d-%H%M%S)"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy"

      - name: Run clang-format
        shell: bash
        run: |
          set -euo pipefail

          find . \
            \( \
              -name '*.cpp' -o \
              -name '*.cc' -o \
              -name '*.cxx' -o \
              -name '*.hpp' -o \
              -name '*.h' \
            \) \
            -not -path './build/*' \
            -print0 | while IFS= read -r -d '' file; do
              clang-format -i "$file"
            done

      - name: Run clang-tidy modernize
        shell: bash
        run: |
          set -euo pipefail

          find src include \
            \( -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) \
            -print0 | while IFS= read -r -d '' file; do

              clang-tidy "$file" \
                -p build \
                --fix \
                --fix-errors \
                -checks='
                  modernize-*,
                  performance-*,
                  readability-*,
                  bugprone-*,
                  portability-*,
                  cppcoreguidelines-*,
                  clang-analyzer-*,
                  -cppcoreguidelines-avoid-magic-numbers,
                  -readability-identifier-length
                ' || true

            done

      - name: Run cppcheck
        shell: bash
        run: |
          set -euo pipefail

          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c++23 \
            --language=c++ \
            --force \
            --inline-suppr \
            --quiet \
            src include || true

      - name: Remove trailing spaces
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \
            \( \
              -name '*.cpp' -o \
              -name '*.hpp' -o \
              -name '*.h' -o \
              -name '*.md' -o \
              -name '*.yml' \
            \) \
            -exec sed -i 's/[[:space:]]*$//' {} +

      - name: Normalize line endings
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \
            \( \
              -name '*.cpp' -o \
              -name '*.hpp' -o \
              -name '*.h' -o \
              -name '*.md' -o \
              -name '*.yml' \
            \) \
            -exec sed -i 's/\r$//' {} +

      - name: Build project
        shell: bash
        run: |
          set -euo pipefail

          cmake --build build --parallel "$(nproc)"

      - name: Verify binary exists
        shell: bash
        run: |
          set -euo pipefail

          test -f build/odin4

      - name: Generate warnings report
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p reports

          cppcheck \
            --enable=all \
            --xml \
            --xml-version=2 \
            src include 2> reports/cppcheck.xml || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Check for changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
          else
            echo "NO_CHANGES=false" >> "$GITHUB_ENV"
          fi

      - name: Commit changes
        if: env.NO_CHANGES == 'false'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "refactor: ultra automatic modernization"

      - name: Push changes
        if: env.NO_CHANGES == 'false'
        shell: bash
        run: |
          set -euo pipefail

          git push origin "$BRANCH"

      - name: Create Pull Request
        if: env.NO_CHANGES == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}
          title: "refactor: ultra automatic modernization"
          body: |
            ## Ultra Automatic Refactor

            This PR was automatically generated.

            ### Applied improvements

            - clang-format
            - clang-tidy modernization
            - performance optimizations
            - readability improvements
            - bug-prone fixes
            - static analysis
            - line ending normalization
            - trailing whitespace cleanup
            - CodeQL security analysis
            - automatic rebuild validation

            ### Validation

            - Build succeeded
            - Static analysis passed
            - Security analysis completed

            Generated automatically for Odin4.