name: Auto Refactor Odin4

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: odin4-refactor
  cancel-in-progress: true

jobs:
  refactor:
    name: Refactor and Improve Source Code
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            clang-format \
            clang-tidy \
            cppcheck \
            cmake \
            ninja-build \
            libusb-1.0-0-dev \
            git \
            jq \
            python3

      - name: Create refactor branch
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="auto/refactor-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git checkout -b "$BRANCH"

      - name: Generate compile_commands.json
        shell: bash
        run: |
          set -euo pipefail

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Apply clang-format
        shell: bash
        run: |
          set -euo pipefail

          find . \( \
            -name '*.cpp' -o \
            -name '*.cc' -o \
            -name '*.cxx' -o \
            -name '*.hpp' -o \
            -name '*.h' \
          \) \
          -not -path './build/*' \
          -print0 | while IFS= read -r -d '' file; do
            clang-format -i "$file"
          done

      - name: Run clang-tidy auto fixes
        shell: bash
        run: |
          set -euo pipefail

          if [ -f build/compile_commands.json ]; then
            find src include \( -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) \
              -print0 | while IFS= read -r -d '' file; do
                clang-tidy "$file" \
                  -p build \
                  --fix \
                  --fix-errors || true
              done
          fi

      - name: Run cppcheck
        shell: bash
        run: |
          set -euo pipefail

          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c++23 \
            --quiet \
            src include || true

      - name: Remove trailing spaces
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.md' -o -name '*.yml' \) \
            -exec sed -i 's/[[:space:]]*$//' {} +

      - name: Normalize line endings
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.md' -o -name '*.yml' \) \
            -exec sed -i 's/\r$//' {} +

      - name: Build project
        shell: bash
        run: |
          set -euo pipefail

          cmake --build build --parallel "$(nproc)"

      - name: Check for changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes detected."
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          else
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Commit changes
        if: env.NO_CHANGES == 'false'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "refactor: automatic code cleanup and modernization"

      - name: Push branch
        if: env.NO_CHANGES == 'false'
        shell: bash
        run: |
          set -euo pipefail

          git push origin "$BRANCH"

      - name: Create Pull Request
        if: env.NO_CHANGES == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}
          title: "refactor: automatic code modernization"
          body: |
            ## Automatic Refactor

            This PR was automatically generated by GitHub Actions.

            ### Improvements applied
            - Code formatting with clang-format
            - Static analysis fixes via clang-tidy
            - Style cleanup
            - Trailing whitespace removal
            - Line ending normalization
            - Build verification

            ### Validation
            - Project compiled successfully
            - Static analysis executed

            Generated automatically for Odin4.
          commit-message: "refactor: automatic modernization"