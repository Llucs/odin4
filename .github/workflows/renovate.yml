name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v41.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}