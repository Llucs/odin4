          cp include/odin4/odin4.h dist/sdk/include/odin4/
          cp build/libodin4.so dist/sdk/lib/ 2>/dev/null || true
          cp build/libodin4_static.a dist/sdk/lib/ 2>/dev/null || true
          cp LICENSE dist/sdk/ 2>/dev/null || true
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          (cd dist && zip -r "odin4-v${VERSION}${SUFFIX}-sdk-linux.zip" sdk)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-linux-arm64
          path: dist/*
          retention-days: 14

  macos_arm64:
    name: macOS ARM64
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          brew install cmake ninja pkg-config libusb cryptopp

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: install-qt-action-macos-arm64
          arch: clang_64

      - name: Configure
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3

      - name: Strip missing AGL framework
        run: |
          set -euo pipefail
          sed -i '' 's/ -framework AGL//g; s/-framework AGL //g' build/build.ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Strip binaries
        run: |
          set -euo pipefail
          strip build/odin4 2>/dev/null || true
          if [ -f build/odin4-gui.app/Contents/MacOS/odin4-gui ]; then
            strip build/odin4-gui.app/Contents/MacOS/odin4-gui 2>/dev/null || true
          fi

      - name: Deploy Qt frameworks
        run: |
          set -euo pipefail
          APP="build/odin4-gui.app"
          if [ -d "$APP" ]; then
            "$QT_ROOT_DIR/bin/macdeployqt" "$APP" -verbose=2
          fi

      - name: Package DMG
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          mkdir -p dist
          APP="build/odin4-gui.app"
          if [ -d "$APP" ]; then
            hdiutil create -volname "Odin4" \
              -srcfolder "$APP" \
              -ov -format UDZO \
              "dist/Odin4-${VERSION}${SUFFIX}-macos-arm64.dmg"
          fi

      - name: Package CLI tarball
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          mkdir -p dist/cli/bin dist/cli/lib
          cp build/odin4 dist/cli/bin/
          cp build/libodin4.dylib dist/cli/lib/
          strip dist/cli/bin/odin4 2>/dev/null || true
          tar czf "dist/odin4-v${VERSION}${SUFFIX}-macos-arm64-cli.tar.gz" -C dist cli

      - name: Package SDK
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          mkdir -p dist/sdk/include/odin4 dist/sdk/lib
          cp include/odin4/odin4.h dist/sdk/include/odin4/
          cp build/libodin4.dylib dist/sdk/lib/ 2>/dev/null || true
          cp build/libodin4_static.a dist/sdk/lib/ 2>/dev/null || true
          cp LICENSE dist/sdk/ 2>/dev/null || true
          (cd dist && zip -r "odin4-v${VERSION}${SUFFIX}-sdk-macos.zip" sdk)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-macos-arm64
          path: dist/*
          retention-days: 14

