name: Build Odin4

on:
  workflow_dispatch:
    inputs:
      suffix:
        required: false
        default: ""
      bundle:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: odin4-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Add GCC 16 PPA
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get install -y \
            cmake \
            ninja-build \
            zip \
            make \
            pkg-config \
            git \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            qt6-base-dev \
            libqt6widgets6 \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libvulkan-dev \
            gcc-16 \
            g++-16

      - name: Ensure Crypto++ static library
        shell: bash
        run: |
          set -euo pipefail

          if ! find /usr /usr/local -name "libcryptopp.a" | grep -q .; then
            git clone --depth 1 \
              --branch CRYPTOPP_8_9_0 \
              https://github.com/weidai11/cryptopp.git \
              /tmp/cryptopp

            cd /tmp/cryptopp

            make -j"$(nproc)"

            sudo make install PREFIX=/usr/local

            sudo ldconfig || true
          fi

      - name: Read version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(grep -E 'ODIN4_VERSION' src/odin4.cpp | sed -E 's/.*"([^"]+)".*/\1/' | head -n 1)"

          SUFFIX="${{ inputs.suffix }}"

          if [[ -n "$SUFFIX" && "$SUFFIX" != -* ]]; then
            SUFFIX="-$SUFFIX"
          fi

          echo "ODIN4_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ODIN4_SUFFIX=$SUFFIX" >> "$GITHUB_ENV"

          echo "OUT_BIN=odin4_${{ matrix.arch }}_${VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_GUI=odin4-gui_${{ matrix.arch }}_${VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_SO=libodin4_${{ matrix.arch }}_${VERSION}${SUFFIX}.so" >> "$GITHUB_ENV"
          echo "OUT_A=libodin4_${{ matrix.arch }}_${VERSION}${SUFFIX}.a" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-16 \
            -DCMAKE_CXX_COMPILER=g++-16

          cmake --build build --parallel "$(nproc)"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp build/odin4 "dist/${OUT_BIN}"
          cp build/odin4-gui "dist/${OUT_GUI}"
          cp build/libodin4.so "dist/${OUT_SO}"
          cp build/libodin4_static.a "dist/${OUT_A}"

          strip "dist/${OUT_BIN}" || true
          strip "dist/${OUT_GUI}" || true
          strip "dist/${OUT_SO}" || true

          ZIP_NAME="odin4-linux-${{ matrix.arch }}-${ODIN4_VERSION}${ODIN4_SUFFIX}.zip"

          cd dist
          zip "../${ZIP_NAME}" *
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: odin4-linux-${{ matrix.arch }}-${{ env.ODIN4_VERSION }}${{ env.ODIN4_SUFFIX }}
          path: |
            dist/*
            ${{ env.ZIP_NAME }}
          retention-days: 14

  bundle:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: build
    if: ${{ inputs.bundle }}

    steps:
      - uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          path: artifacts

      - name: Create bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p bundle
          find artifacts -type f -name "*.zip" -exec cp {} bundle/ \;

          SAMPLE="$(find bundle -type f -name '*.zip' | head -n 1)"
          BASE="$(basename "$SAMPLE")"
          VERSUFFIX="$(echo "${BASE}" | sed -E 's/^odin4-linux-[^-]+-(.+)\.zip$/\1/')"

          OUT="odin4-linux-all-${VERSUFFIX}.zip"

          cd bundle
          zip "../${OUT}" ./*
          cd ..

          echo "OUT=${OUT}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: odin4-linux-all
          path: |
            ${{ env.OUT }}
          retention-days: 14