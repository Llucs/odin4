name: Build Odin4

on:
  push:
    branches: [ multiplataform ]
  pull_request:
    branches: [ multiplataform ]
  workflow_dispatch:
    inputs:
      suffix:
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            triplet: x64-linux
          - os: windows-latest
            arch: x86_64
            triplet: x64-windows-static
          - os: macos-latest
            arch: universal
            triplet: x64-osx # vcpkg doesn't have a universal triplet by default, we'll handle it

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libusb-1.0-0-dev libcrypto++-dev qt6-base-dev libgl1-mesa-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config libusb cryptopp qt6

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '2b65c20fc66eda893aa15a15a453c3cf09500b19'

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libusb cryptopp qt6-base --triplet x64-windows-static-md

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DODIN4_BUILD_TESTS=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release -DODIN4_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-${{ runner.os }}-${{ matrix.arch }}
          path: |
            build/odin4*
            build/libodin4*
            !build/**/*.obj
            !build/**/*.o
            !build/**/*.cpp
            !build/**/*.h
