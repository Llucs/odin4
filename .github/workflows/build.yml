name: Build Odin4

on:
  workflow_dispatch:
    inputs:
      suffix:
        required: false
        default: ""
      bundle:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: odin4-build-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.7.3"

jobs:
  linux_x86_64:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libusb-1.0-0-dev libcrypto++-dev \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev libgl-dev libglx-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxcb-cursor-dev libvulkan-dev \
            patchelf wget file

      - name: Install Qt6 (for linuxdeploy)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: install-qt-action-linux-x86_64
          arch: linux_gcc_64

      - name: Configure
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENGL_opengl_LIBRARY=/usr/lib/x86_64-linux-gnu/libOpenGL.so \
            -DOPENGL_glx_LIBRARY=/usr/lib/x86_64-linux-gnu/libGLX.so

      - name: Build
        run: cmake --build build --parallel

      - name: Strip binaries
        run: |
          set -euo pipefail
          strip build/odin4 build/libodin4.so 2>/dev/null || true
          if [ -f build/odin4-gui ]; then
            strip build/odin4-gui 2>/dev/null || true
          fi

      - name: Package AppImage
        run: |
          set -euo pipefail
          rm -rf AppDir
          cmake --install build --prefix "$PWD/AppDir/usr"

          mkdir -p AppDir/usr/lib
          cp "$(g++ --print-file-name=libstdc++.so.6)" AppDir/usr/lib/ 2>/dev/null || true
          cp "$(gcc --print-file-name=libgcc_s.so.1)" AppDir/usr/lib/ 2>/dev/null || true

          mkdir -p AppDir/usr/share/applications
          if [ -f packaging/linux/odin4.desktop ]; then
            cp packaging/linux/odin4.desktop AppDir/usr/share/applications/
          fi

          if [ -f docs/assets/logo.png ]; then
            mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
            cp docs/assets/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/odin4.png
          fi

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export PATH="$QT_ROOT_DIR/bin:$PATH"
          export QMAKE="$QT_ROOT_DIR/bin/qmake"

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          APPIMAGE_FILE="$(ls -1 *.AppImage 2>/dev/null | head -n1)"
          if [ -n "$APPIMAGE_FILE" ]; then
            mv "$APPIMAGE_FILE" "Odin4-${VERSION}${SUFFIX}-linux-x86_64.AppImage"
          fi

      - name: Package CLI tarball
        run: |
          set -euo pipefail
          mkdir -p dist/cli/bin dist/cli/lib
          cp build/odin4 dist/cli/bin/
          cp build/libodin4.so dist/cli/lib/
          strip dist/cli/bin/odin4 dist/cli/lib/libodin4.so 2>/dev/null || true
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          tar czf "dist/odin4-v${VERSION}${SUFFIX}-linux-x86_64-cli.tar.gz" -C dist cli

      - name: Package SDK
        run: |
          set -euo pipefail
          mkdir -p dist/sdk/include/odin4 dist/sdk/lib
          cp include/odin4/odin4.h dist/sdk/include/odin4/
          cp build/libodin4.so dist/sdk/lib/ 2>/dev/null || true
          cp build/libodin4_static.a dist/sdk/lib/ 2>/dev/null || true
          cp LICENSE dist/sdk/ 2>/dev/null || true
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          (cd dist && zip -r "odin4-v${VERSION}${SUFFIX}-sdk-linux.zip" sdk)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-linux-x86_64
          path: dist/*
          retention-days: 14

  linux_arm64:
