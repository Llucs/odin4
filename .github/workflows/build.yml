          SUFFIX="${{ inputs.suffix }}"
          installer="$(ls -1 build/*.exe | head -n1)"
          mkdir -p dist
          mv "$installer" "dist/Odin4-${VERSION}${SUFFIX}-windows-arm64-setup.exe"

      - name: Package portable zip
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          install_root="$PWD/build/install/odin4"
          rm -rf "$install_root"
          cmake --install build --prefix "$install_root"
          mkdir -p dist
          cd build/install
          7z a -tzip "$OLDPWD/dist/odin4-v${VERSION}${SUFFIX}-windows-arm64-portable.zip" odin4/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-windows-arm64
          path: dist/*
          retention-days: 14

  bundle:
    name: Bundle all artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - linux_x86_64
      - linux_arm64
      - macos_arm64
      - macos_x86_64
      - windows_x86_64
      - windows_arm64
    if: ${{ inputs.bundle }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release bundle
        run: |
          set -euo pipefail
          mkdir -p bundle
          find artifacts -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} bundle/ \;

          SAMPLE="$(find bundle -type f | head -n 1)"
          BASE="$(basename "$SAMPLE")"
          VERSUFFIX="$(echo "${BASE}" | sed -E 's/^[^0-9]+([0-9]+\.[0-9]+\.[0-9]+[^.-]*).*/\1/')"

          OUT="odin4-all-${VERSUFFIX}.zip"
          cd bundle
          zip "../${OUT}" ./*

          echo "OUT=${OUT}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: odin4-all
          path: ${{ env.OUT }}
          retention-days: 14
