          cp build/libodin4.dylib dist/sdk/lib/ 2>/dev/null || true
          cp build/libodin4_static.a dist/sdk/lib/ 2>/dev/null || true
          cp LICENSE dist/sdk/ 2>/dev/null || true
          (cd dist && zip -r "odin4-v${VERSION}${SUFFIX}-sdk-macos.zip" sdk)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-macos-x86_64
          path: dist/*
          retention-days: 14

  windows_x86_64:
    name: Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        run: |
          set -euo pipefail
          choco install ninja -y
          echo "VCPKG_ROOT=C:\vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_TARGET_TRIPLET=x64-windows" >> "$GITHUB_ENV"
          vcpkg install libusb:x64-windows cryptopp:x64-windows

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: install-qt-action-windows-x86_64
          host: windows
          arch: win64_msvc2019_64

      - name: Configure
        run: |
          set -euo pipefail
          echo "$QT_ROOT_DIR/bin" >> "$GITHUB_PATH"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_PREFIX_PATH=$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt DLLs (windeployqt)
        run: |
          set -euo pipefail
          if [ -f "build/odin4-gui.exe" ]; then
            DEPLOY_QT_DIR="${QT_ROOT_DIR}/bin"
            if [ -n "${QT_HOST_PATH:-}" ]; then
              DEPLOY_QT_DIR="${QT_HOST_PATH}/bin"
            fi
            echo "$DEPLOY_QT_DIR" >> "$GITHUB_PATH"
            "$DEPLOY_QT_DIR/windeployqt" --no-translations --no-compiler-runtime build/odin4-gui.exe
          else
            echo "No GUI binary found, skipping windeployqt"
          fi

      - name: Package installer (NSIS)
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          cmake --build build --target package --config Release || {
            echo "NSIS packaging failed"
            cat build/_CPack_Packages/*/NSIS/NSISOutput.log 2>/dev/null || true
            exit 1
          }
          SUFFIX="${{ inputs.suffix }}"
          installer="$(ls -1 build/*.exe | head -n1)"
          mkdir -p dist
          mv "$installer" "dist/Odin4-${VERSION}${SUFFIX}-windows-x86_64-setup.exe"

      - name: Package portable zip
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          install_root="$PWD/build/install/odin4"
          rm -rf "$install_root"
          cmake --install build --prefix "$install_root"
          mkdir -p dist
          cd build/install
          7z a -tzip "$OLDPWD/dist/odin4-v${VERSION}${SUFFIX}-windows-x86_64-portable.zip" odin4/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-windows-x86_64
          path: dist/*
          retention-days: 14

  windows_arm64:
    name: Windows ARM64
    runs-on: windows-11-arm
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Install dependencies
        run: |
          set -euo pipefail
          choco install ninja -y
          echo "VCPKG_ROOT=C:\vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_TARGET_TRIPLET=arm64-windows" >> "$GITHUB_ENV"
          vcpkg install libusb:arm64-windows cryptopp:arm64-windows

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: install-qt-action-windows-arm64
          host: windows
          arch: win64_msvc2019_arm64

      - name: Configure
        run: |
          set -euo pipefail
          echo "$QT_ROOT_DIR/bin" >> "$GITHUB_PATH"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_PREFIX_PATH=$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt DLLs (windeployqt)
        run: |
          set -euo pipefail
          if [ -f "build/odin4-gui.exe" ]; then
