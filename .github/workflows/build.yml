name: Build Odin4

on:
  push:
    branches: [ multiplataform ]
  pull_request:
    branches: [ multiplataform ]
  workflow_dispatch:
    inputs:
      suffix:
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            triplet: x64-linux

          - os: windows-latest
            arch: x86_64
            triplet: x64-windows-static-md

          - os: macos-14
            arch: arm64
            triplet: arm64-osx

          - os: macos-14
            arch: x86_64
            triplet: x64-osx

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # =========================
      # Setup Linux toolchain
      # =========================
      - name: Setup GCC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ cmake ninja-build

      # =========================
      # Setup vcpkg (ALL OS)
      # =========================
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '2b65c20fc66eda893aa15a15a453c3cf09500b19'
          doNotUpdateVcpkg: false
          doNotCache: false

      # =========================
      # Install deps via vcpkg
      # =========================
      - name: Install dependencies (vcpkg)
        run: |
          vcpkg install libusb cryptopp qtbase --triplet ${{ matrix.triplet }}

      # =========================
      # Configure (Unix)
      # =========================
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DODIN4_BUILD_TESTS=ON

      # =========================
      # Configure (Windows)
      # =========================
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DODIN4_BUILD_TESTS=ON

      # =========================
      # Build
      # =========================
      - name: Build
        run: cmake --build build --config Release

      # =========================
      # Tests
      # =========================
      - name: Run Tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      # =========================
      # Artifacts
      # =========================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-${{ runner.os }}-${{ matrix.arch }}
          path: |
            build/odin4*
            build/libodin4*