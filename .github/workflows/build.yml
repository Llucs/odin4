          SUFFIX="${{ inputs.suffix }}"
          APPIMAGE_FILE="$(ls -1 *.AppImage 2>/dev/null | head -n1)"
          if [ -n "$APPIMAGE_FILE" ]; then
            mv "$APPIMAGE_FILE" "Odin4-${VERSION}${SUFFIX}-linux-arm64.AppImage"
          fi

      - name: Package CLI tarball
        run: |
          set -euo pipefail
          mkdir -p dist/cli/bin dist/cli/lib
          cp build/odin4 dist/cli/bin/
          cp build/libodin4.so dist/cli/lib/
          strip dist/cli/bin/odin4 dist/cli/lib/libodin4.so 2>/dev/null || true
          VERSION="$(awk -F'"' '/ODIN4_VERSION/ {print $2}' src/odin4.cpp)"
          SUFFIX="${{ inputs.suffix }}"
          tar czf "dist/odin4-v${VERSION}${SUFFIX}-linux-arm64-cli.tar.gz" -C dist cli

      - name: Package SDK
        run: |
