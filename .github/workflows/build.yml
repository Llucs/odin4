name: Build Odin4

on:
  workflow_dispatch:
    inputs:
      suffix:
        required: false
        default: ""
      bundle:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: odin4-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            os: linux
          - arch: arm64
            runner: ubuntu-22.04-arm
            os: linux
          - arch: x86_64
            runner: windows-2022
            os: windows
          - arch: arm64
            runner: macos-14
            os: macos

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Install dependencies (Linux)
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update

          sudo apt-get install -y \
            cmake \
            ninja-build \
            zip \
            make \
            pkg-config \
            git \
            libusb-1.0-0-dev \
            libcrypto++-dev \
            qt6-base-dev \
            libqt6widgets6 \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libvulkan-dev \
            gcc-16 \
            g++-16

      - name: Ensure Crypto++ static library (Linux)
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          if ! find /usr /usr/local -name "libcryptopp.a" | grep -q .; then
            git clone --depth 1 \
              --branch CRYPTOPP_8_9_0 \
              https://github.com/weidai11/cryptopp.git \
              /tmp/cryptopp

            cd /tmp/cryptopp

            make -j"$(nproc)"

            sudo make install PREFIX=/usr/local

            sudo ldconfig || true
          fi

      - name: Install dependencies (macOS)
        if: ${{ matrix.os == 'macos' }}
        shell: bash
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          set -euo pipefail

          # Remove problematic taps that may block brew update
          rm -rf /opt/homebrew/Library/Taps/aws 2>/dev/null || true
          rm -rf /opt/homebrew/Library/Taps/azure 2>/dev/null || true
          rm -rf /opt/homebrew/Library/Taps/hashicorp 2>/dev/null || true

          brew update
          brew install cmake ninja pkg-config libusb cryptopp

      - name: Install dependencies (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: bash
        run: |
          set -euo pipefail

          choco install cmake ninja zip -y

          # Download pre-built MSYS2 MinGW64 packages (avoids autotools/libtool path issues on Windows)
          mkdir -p C:/mingw64/include C:/mingw64/lib

          # libusb 1.0.27 (matches tag used in original CI)
          curl -sL https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-libusb-1.0.27-1-any.pkg.tar.zst -o /tmp/libusb.pkg.tar.zst
          mkdir -p /tmp/libusb_pkg
          tar --zstd -xf /tmp/libusb.pkg.tar.zst -C /tmp/libusb_pkg
          cp -r /tmp/libusb_pkg/mingw64/include/libusb-1.0 C:/mingw64/include/
          cp /tmp/libusb_pkg/mingw64/lib/libusb-1.0.a C:/mingw64/lib/

          # Crypto++ 8.9.0 (matches tag used in original CI)
          curl -sL "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-crypto%2B%2B-8.9.0-1-any.pkg.tar.zst" -o /tmp/cryptopp.pkg.tar.zst
          mkdir -p /tmp/cryptopp_pkg
          tar --zstd -xf /tmp/cryptopp.pkg.tar.zst -C /tmp/cryptopp_pkg
          cp -r /tmp/cryptopp_pkg/mingw64/include/cryptopp C:/mingw64/include/
          cp /tmp/cryptopp_pkg/mingw64/lib/libcryptopp.a C:/mingw64/lib/

          echo "CMAKE_PREFIX_PATH=C:/mingw64" >> "$GITHUB_ENV"

      - name: Read version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(grep -E 'ODIN4_VERSION' src/odin4.cpp | sed -E 's/.*"([^"]+)".*/\1/' | head -n 1)"

          SUFFIX="${{ inputs.suffix }}"

          if [[ -n "$SUFFIX" && "$SUFFIX" != -* ]]; then
            SUFFIX="-$SUFFIX"
          fi

          echo "ODIN4_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ODIN4_SUFFIX=$SUFFIX" >> "$GITHUB_ENV"

          echo "OUT_BIN=odin4_${{ matrix.arch }}_${VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_GUI=odin4-gui_${{ matrix.arch }}_${VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_SO=libodin4_${{ matrix.arch }}_${VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_A=libodin4_${{ matrix.arch }}_${VERSION}${SUFFIX}" >> "$GITHUB_ENV"

      - name: Build (Linux)
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-16 \
            -DCMAKE_CXX_COMPILER=g++-16

          cmake --build build --parallel "$(nproc)"

      - name: Build (macOS)
        if: ${{ matrix.os == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build build --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Build (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build build --parallel

      - name: Package (Linux)
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp build/odin4 "dist/${OUT_BIN}" || true
          cp build/odin4-gui "dist/${OUT_GUI}" || true
          cp build/libodin4.so "dist/${OUT_SO}" || true
          cp build/libodin4_static.a "dist/${OUT_A}" || true

          strip "dist/${OUT_BIN}" 2>/dev/null || true
          strip "dist/${OUT_GUI}" 2>/dev/null || true
          strip "dist/${OUT_SO}" 2>/dev/null || true

          ZIP_NAME="odin4-linux-${{ matrix.arch }}-${ODIN4_VERSION}${ODIN4_SUFFIX}.zip"

          cd dist
          zip "../${ZIP_NAME}" * 2>/dev/null || true
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Package (macOS)
        if: ${{ matrix.os == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp build/odin4 "dist/${OUT_BIN}"
          cp build/odin4-gui "dist/${OUT_GUI}" || true
          cp build/libodin4.dylib "dist/${OUT_SO}" || true
          cp build/libodin4_static.a "dist/${OUT_A}"

          ZIP_NAME="odin4-macos-${{ matrix.arch }}-${ODIN4_VERSION}${ODIN4_SUFFIX}.zip"

          cd dist
          zip "../${ZIP_NAME}" *
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp build/odin4.exe "dist/${OUT_BIN}.exe" || true
          cp build/odin4-gui.exe "dist/${OUT_GUI}.exe" || true
          cp build/odin4.dll "dist/${OUT_SO}.dll" || true
          cp build/libodin4.dll "dist/${OUT_SO}.dll" || true
          cp build/odin4_static.lib "dist/${OUT_A}" || true
          cp build/libodin4_static.lib "dist/${OUT_A}" || true

          ZIP_NAME="odin4-windows-${{ matrix.arch }}-${ODIN4_VERSION}${ODIN4_SUFFIX}.zip"

          cd dist
          7z a "../${ZIP_NAME}" * || zip "../${ZIP_NAME}" *
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: odin4-${{ matrix.os }}-${{ matrix.arch }}-${{ env.ODIN4_VERSION }}${{ env.ODIN4_SUFFIX }}
          path: |
            dist/*
            ${{ env.ZIP_NAME }}
          retention-days: 14

  bundle:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: build
    if: ${{ inputs.bundle }}

    steps:
      - uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          path: artifacts

      - name: Create bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p bundle
          find artifacts -type f -name "*.zip" -exec cp {} bundle/ \;

          SAMPLE="$(find bundle -type f -name '*.zip' | head -n 1)"
          BASE="$(basename "$SAMPLE")"
          VERSUFFIX="$(echo "${BASE}" | sed -E 's/^odin4-(linux|macos|windows)-[^-]+-(.+)\.zip$/\2/')"

          OUT="odin4-all-${VERSUFFIX}.zip"

          cd bundle
          zip "../${OUT}" ./*
          cd ..

          echo "OUT=${OUT}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: odin4-all
          path: |
            ${{ env.OUT }}
          retention-days: 14