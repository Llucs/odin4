name: Build Odin4 Multiplatform

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: "Optional suffix appended to the filename (e.g. -rc1, -beta). Leave empty for none."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
          - os: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: windows
            arch: x64
            runner: windows-latest
          - os: macos
            arch: universal
            runner: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libusb-1.0-0-dev libcrypto++-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install cmake ninja libusb cryptopp

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          vcpkg install libusb:x64-windows-static cryptopp:x64-windows-static

      - name: Read version from source
        shell: bash
        run: |
          VERSION=$(grep -E '^[[:space:]]*#define[[:space:]]+ODIN4_VERSION[[:space:]]+"' "src/odin4.cpp" | sed -E 's/.*ODIN4_VERSION[[:space:]]+"([^"]+)".*/\1/' | head -n 1)
          echo "ODIN4_VERSION=$VERSION" >> $GITHUB_ENV
          
          SUFFIX="${{ inputs.suffix }}"
          if [ -n "$SUFFIX" ] && [[ "$SUFFIX" != -* ]]; then
            SUFFIX="-$SUFFIX"
          fi
          echo "ODIN4_SUFFIX=$SUFFIX" >> $GITHUB_ENV

      - name: Configure CMake (Linux)
        if: matrix.os == 'linux'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (macOS Universal)
        if: matrix.os == 'macos'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release

      - name: Package artifact (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          mkdir dist
          cp build/odin4 dist/odin4_${{ matrix.arch }}
          cp build/libodin4.so dist/libodin4_${{ matrix.arch }}.so
          cd dist && zip ../odin4-linux-${{ matrix.arch }}-${{ env.ODIN4_VERSION }}${{ env.ODIN4_SUFFIX }}.zip *

      - name: Package artifact (macOS Universal)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          mkdir dist
          cp build/odin4 dist/odin4_macos_universal
          cp build/libodin4.dylib dist/libodin4_macos_universal.dylib
          cd dist && zip ../odin4-macos-universal-${{ env.ODIN4_VERSION }}${{ env.ODIN4_SUFFIX }}.zip *

      - name: Package artifact (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          mkdir dist
          cp build/Release/odin4.exe dist/odin4.exe
          cp build/Release/odin4.dll dist/odin4.dll
          Compress-Archive -Path dist/* -DestinationPath odin4-windows-x64-${{ env.ODIN4_VERSION }}${{ env.ODIN4_SUFFIX }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: odin4-${{ matrix.os }}-${{ matrix.arch }}
          path: "*.zip"
