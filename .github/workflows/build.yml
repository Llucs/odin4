name: Build Odin4

on:
  workflow_dispatch:
    inputs:
      suffix:
        required: false
        default: ""
      bundle:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: odin4-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: sigstore/cosign-installer@v3

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build zip make pkg-config git \
            libusb-1.0-0-dev libcrypto++-dev qt6-base-dev \
            libqt6widgets6 libgl1-mesa-dev gcc-14 g++-14

      - name: Ensure Crypto++ static library
        shell: bash
        run: |
          if ! find /usr /usr/local -name "libcryptopp.a" | grep -q .; then
            git clone --depth 1 --branch CRYPTOPP_8_9_0 https://github.com/weidai11/cryptopp.git /tmp/cryptopp
            cd /tmp/cryptopp && make -j"$(nproc)" && sudo make install PREFIX=/usr/local && sudo ldconfig || true
          fi

      - name: Read version
        shell: bash
        run: |
          VERSION="$(grep -E 'ODIN4_VERSION' src/odin4.cpp | sed -E 's/.*"([^"]+)".*/\1/' | head -n 1)"
          SUFFIX="${{ inputs.suffix }}"
          [[ -n "$SUFFIX" && "$SUFFIX" != -* ]] && SUFFIX="-$SUFFIX"

          echo "ODIN4_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ODIN4_SUFFIX=$SUFFIX" >> "$GITHUB_ENV"

          echo "OUT_BIN=odin4_\( {{ matrix.arch }}_ \){VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_GUI=odin4-gui_\( {{ matrix.arch }}_ \){VERSION}${SUFFIX}" >> "$GITHUB_ENV"
          echo "OUT_SO=libodin4_\( {{ matrix.arch }}_ \){VERSION}${SUFFIX}.so" >> "$GITHUB_ENV"
          echo "OUT_A=libodin4_\( {{ matrix.arch }}_ \){VERSION}${SUFFIX}.a" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          rm -rf build
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14
          cmake --build build --parallel "$(nproc)"

      - name: Package & Sign individual files
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          mkdir -p artifacts

          cp build/odin4         "artifacts/${OUT_BIN}"
          cp build/odin4-gui     "artifacts/${OUT_GUI}"
          cp build/libodin4.so   "artifacts/${OUT_SO}"
          cp build/libodin4_static.a "artifacts/${OUT_A}"

          strip artifacts/* 2>/dev/null || true

          cd artifacts

          sha256sum * > checksums.txt

          for file in *; do
            echo "Signing ${file}..."
            cosign sign-blob --yes --bundle "\( {file}.bundle" " \){file}"
          done

      - name: Provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odin4-linux-\( {{ matrix.arch }}- \){{ env.ODIN4_VERSION }}${{ env.ODIN4_SUFFIX }}
          path: artifacts/*
          retention-days: 14

  bundle:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: build
    if: ${{ inputs.bundle }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create all-in-one bundle
        shell: bash
        run: |
          mkdir -p bundle
          find artifacts -type f ! -name "*.bundle" -exec cp {} bundle/ \;
          cd bundle
          OUT="odin4-linux-all-\( {{ env.ODIN4_VERSION || 'unknown' }} \){{ env.ODIN4_SUFFIX }}.zip"
          zip -r "../${OUT}" *
          echo "OUT=${OUT}" >> "$GITHUB_ENV"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: odin4-linux-all
          path: ${{ env.OUT }}
          retention-days: 14