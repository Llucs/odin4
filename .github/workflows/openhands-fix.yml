name: OpenHands Auto Fix

on:
  workflow_dispatch:

jobs:
  openhands:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send task to OpenHands
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST "https://app.all-hands.dev/api/v1/app-conversations" \
            -H "Authorization: Bearer $OPENHANDS_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"selected_repository\": \"$REPO\",
              \"git_provider\": \"github\",
              \"selected_branch\": \"main\",
              \"secrets\": {
                \"GITHUB_TOKEN\": \"$GH_TOKEN\"
              },
              \"initial_message\": {
                \"content\": [
                  {
                    \"type\": \"text\",
                    \"text\": \"You are an automated code analysis and repair agent. Analyze the repository strictly using real evidence from the codebase. Do not invent issues. Apply minimal necessary fixes only. After completing changes, commit them and open a pull request using the provided GitHub authentication. Do not simulate results.\"
                  }
                ]
              }
            }"